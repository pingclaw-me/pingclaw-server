<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of service — PingClaw</title>
<meta name="description" content="PingClaw's terms of service.">

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#B8472C">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/pingclaw-site.css">
</head>
<body>

<nav class="top">
  <div class="container nav-inner">
    <a href="/" class="logomark">
      <span class="pin"></span>
      pingclaw
    </a>
    <div class="nav-links">
      <a href="/">‹ Back</a>
    </div>
  </div>
</nav>

<div class="legal-wrap">

  <div class="legal-eyebrow">Terms</div>
  <h1 class="legal-title">Terms of service</h1>
  <div class="legal-date">Last updated: {{.LastUpdated}}</div>

  <div class="legal-prose">
    {{.Content}}
  </div>

</div>

<footer class="site-footer">
  <div class="container inner">
    <span class="footer-tag">pingclaw · location context for any AI agent</span>
    <div>
      <a href="/privacypolicy">Privacy</a>
      <a href="/termsofservice">Terms</a>
      <a href="/deleteaccount">Delete account</a>
      <a href="https://github.com/pingclaw-me">GitHub</a>
      <span style="margin-left: 24px; color: var(--ink-faint);">© 2026 Christian Reimer</span>
    </div>
  </div>
</footer>

<script>
if (new URLSearchParams(location.search).has('embedded')) {
    document.querySelector('nav.top')?.remove();
    document.querySelector('footer.site-footer')?.remove();
}
</script>
<script src="/pingclaw-site.js"></script>

</body>
</html>
